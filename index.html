<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Social links profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }

    body {
      background-color: hsl(0, 0%, 8%);
      color: white;
      font-family: 'Inter';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      /* object-fit: cover; */
    }

    .container {
      background-color: hsl(0, 0%, 12%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      padding: 25px;
    }

    h2,
    h6 {
      margin: 3px;
    }

    h2 {
      font-weight: 600;
    }

    h6 {
      color: hsl(75, 94%, 57%);
      font-weight: 600;
    }

    .social {
      display: block;
      width: 240px;
      background-color: hsl(0, 0%, 20%);
      padding: 10px;
      margin: 8px 0;
      color: white;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      font-family: 'Inter';
    }

    .social:hover {
      background-color: hsl(75, 94%, 57%);
      color: black;
      cursor: pointer;
    }

    p {
      color: hsl(0, 0%, 70%);
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="./assets/images/Piyush1.JPG">

    <h2>Piyush Surana</h2>
    <h6>Hyderabad, India</h6>
    <p>“Driven by curiosity and code.”</p>

    <a class="social" href="https://github.com/Surana-Piyush" target="_blank">GitHub</a>

    <a class="social" href="https://www.linkedin.com/in/piyushsurana01/" target="_blank">LinkedIn</a>

    <a class="social" href="https://www.instagram.com/suranapiyush01/" target="_blank">Instagram</a>

    <a class="social" href="https://twitter.com/" target="_blank">Twitter</a>

  </div>


</body>

</html>
