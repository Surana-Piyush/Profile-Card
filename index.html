<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Social links profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }

    body {
      background-color: hsl(0, 0%, 8%);
      color: white;
      font-family: 'Inter';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      /* object-fit: cover; */
    }

    .container {
      background-color: hsl(0, 0%, 12%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 10px;
      padding: 25px;
    }

    h2,
    h6 {
      margin: 3px;
    }

    h2 {
      font-weight: 600;
    }

    h6 {
      color: hsl(75, 94%, 57%);
      font-weight: 600;
    }

    .social {
      width: 240px;
      background-color: hsl(0, 0%, 20%);
      padding: 10px;
      margin: 8px 0;
      color: white;
      border-radius: 8px;
      border: none;
      font-family: 'Inter';
    }

    .social:hover {
      background-color: hsl(75, 94%, 57%);
      color: black;
      cursor: pointer;
    }

    p {
      color: hsl(0, 0%, 70%);
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="./assets/images/Piyush1.JPG">

    <h2>Piyush Surana</h2>
    <h6>Hyderabad, India</h6>
    <p>“Driven by curiosity and code.”</p>

    <button class="social" onclick="openlink('https://github.com/Surana-Piyush')">GitHub</button>

    <button class="social" onclick="openlink('www.linkedin.com/in/piyushsurana01')">LinkedIn</button>

    <button class="social" onclick="openlink('https://www.instagram.com/suranapiyush01/')">Instagram</button>

    <button class="social" onclick="openlink()">Twitter</button>

  </div>

  <script>
    function openlink(url) {
      window.open(url, "_blank");
    }
  </script>


</body>

</html>
